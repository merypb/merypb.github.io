<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCex_W7gk3Zg1ITlcjb2ZBs3WD3kH_4hiBUdxGK9HSyUEye_6P2PvG6UsDQEsYNMZNmLNazx2QkyA_/pub?gid=1280662564&single=true&output=csv';

  function cleanValue(v) {
    if (v === null || v === undefined) return '';
    return String(v).trim();
  }

  function normalize(str) {
    return cleanValue(str)
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '');
  }

  function highlightName(text) {
    return cleanValue(text)
      .replace(/Prada Bou, M\./g, '<strong class="mine">Prada Bou, M.</strong>')
      .replace(/María Prada Bou/g, '<strong class="mine">María Prada Bou</strong>');
  }

  function mapRow(row) {
    return {
      id: cleanValue(row.id),
      tipo: cleanValue(row.tipo),
      destacado: cleanValue(row.destacado),
      año: cleanValue(row.año),
      titulo: cleanValue(row.titulo),
      subtipo: cleanValue(row.subtipo),
      grupo_estudio: cleanValue(row.grupo_estudio),
      fecha_inicio: cleanValue(row.fecha_inicio),
      fecha_fin: cleanValue(row.fecha_fin),
      autores: cleanValue(row.autores),
      primera_autoria: cleanValue(row.primera_autoria),
      entidad_evento: cleanValue(row.entidad_evento),
      lugar: cleanValue(row.lugar),
      horas: cleanValue(row.horas),
      tipo_presentacion: cleanValue(row.tipo_presentacion),
      doi: cleanValue(row.doi),
      texto_cv: cleanValue(row.texto_cv)
    };
  }

  function renderItem(row) {
    let texto = row.texto_cv;

    if (!texto) {
      texto =
        (row.año ? row.año + '. ' : '') +
        (row.titulo ? row.titulo : '') +
        (row.autores ? '. ' + row.autores : '') +
        (row.entidad_evento ? '. ' + row.entidad_evento : '') + '.';
    }

    texto = highlightName(texto).replace(/\.\./g, '.');

    const links = [];
    if (row.doi) {
      links.push(`<a href="${row.doi}" target="_blank" rel="noopener noreferrer">DOI</a>`);
    }

    return `
      <div class="item">
        <p>${texto}</p>
        ${links.length ? `<div class="meta">${links.join('')}</div>` : ''}
      </div>
    `;
  }

  function renderSection(containerId, rows, tipoBuscado, emptyText) {
    const container = document.getElementById(containerId);

    const items = rows
      .map(mapRow)
      .filter(row => normalize(row.tipo) === normalize(tipoBuscado))
      .sort((a, b) => Number(b.año || 0) - Number(a.año || 0));

    if (!items.length) {
      container.innerHTML = `<div class="item"><p class="empty">${emptyText}</p></div>`;
      return;
    }

    container.innerHTML = items.map(renderItem).join('');
  }

  Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results) {
      const rows = results.data;

      renderSection('publicaciones-lista', rows, 'Artículo', 'No hay publicaciones visibles todavía.');
      renderSection('comunicaciones-lista', rows, 'Comunicación', 'No hay comunicaciones visibles todavía.');
      renderSection('cursos-lista', rows, 'Curso', 'No hay cursos visibles todavía.');
      renderSection('sesiones-lista', rows, 'Sesión', 'No hay sesiones visibles todavía.');
      renderSection('proyectos-lista', rows, 'Proyecto', 'No hay proyectos visibles todavía.');
    },
    error: function(error) {
      console.error(error);
      ['publicaciones-lista','comunicaciones-lista','cursos-lista','sesiones-lista','proyectos-lista']
        .forEach(id => {
          document.getElementById(id).innerHTML =
            '<div class="item"><p class="empty">No se han podido cargar los datos automáticamente.</p></div>';
        });
    }
  });
</script>
