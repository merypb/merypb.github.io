<!doctype html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>María Prada Bou · CV ampliado</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
:root{
  --bg:#f7f4ef;
  --surface:#fff;
  --text:#1f1c18;
  --muted:#6f6a63;
  --line:rgba(0,0,0,.08);
  --accent:#1f6b63;
  --accent-soft:#e6f2ef;
  --radius:18px;
  --shadow:0 10px 30px rgba(0,0,0,.06);
  --sidebar:290px;
}

[data-theme="dark"]{
  --bg:#141210;
  --surface:#1c1916;
  --text:#eee;
  --muted:#b3aa9f;
  --line:rgba(255,255,255,.08);
  --accent:#7fc7bd;
  --accent-soft:#20322f;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

.shell{
  max-width:1200px;
  margin:auto;
  padding:24px;
}

.grid{
  display:grid;
  grid-template-columns:var(--sidebar) 1fr;
  gap:28px;
}

/* SIDEBAR */
.sidebar{
  position:sticky;
  top:18px;
}

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
  box-shadow:var(--shadow);
}

/* 🔥 FIX FOTO RESPONSIVE */
.photo{
  width:100%;
  max-width:220px;   /* 👈 clave */
  height:auto;
  aspect-ratio:4/5;
  object-fit:cover;
  border-radius:18px;
  display:block;
  margin:0 auto 12px;
}

/* NOMBRE */
.name{
  font-size:28px;
  font-weight:800;
  margin:10px 0 4px;
}

/* EMAIL COPIABLE */
.email{
  font-size:13px;
  color:var(--muted);
  user-select:all;
  display:block;
  margin:4px 0;
}

/* NAV */
.nav a{
  display:flex;
  justify-content:space-between;
  padding:10px;
  text-decoration:none;
  border-radius:10px;
  font-weight:600;
}
.nav a:hover{
  background:var(--accent-soft);
}

/* HERO */
.hero{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:22px;
  padding:28px;
  box-shadow:var(--shadow);
}

.hero h1{
  font-family:'Instrument Serif';
  font-size:42px;
  margin:0;
}

/* SECTIONS */
.section{
  margin-top:18px;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow);
}

.section h2{
  font-family:'Instrument Serif';
  margin:0 0 10px;
}

/* ITEMS */
.item{
  display:grid;
  grid-template-columns:70px 1fr;
  gap:14px;
  padding:12px 0;
  border-top:1px solid var(--line);
}

.year{
  font-size:11px;
  color:var(--muted);
}

/* MOBILE FIX */
@media (max-width: 900px){
  .grid{
    grid-template-columns:1fr;
  }

  .sidebar{
    position:relative;
  }

  .photo{
    max-width:160px; /* 🔥 CLAVE: no gigante en móvil */
  }
}
</style>
</head>

<body>

<div class="shell">
<div class="grid">

<!-- SIDEBAR -->
<aside class="sidebar">
<div class="card">

<img class="photo" src="./maria.prada.png">

<div class="name">María Prada Bou</div>

<div style="font-size:12px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase">
Farmacia Hospitalaria
</div>

<!-- EMAILS COPIABLES -->
<div style="margin-top:10px">
<span class="email">maria.prada.07@gmail.com</span>
<span class="email">maria.prada@salud.madrid.org</span>
</div>

<nav class="nav">
<a href="#pub">Publicaciones</a>
<a href="#com">Comunicaciones</a>
<a href="#cur">Cursos</a>
<a href="#ses">Sesiones</a>
<a href="#pro">Proyectos</a>
</nav>

</div>
</aside>

<!-- MAIN -->
<main>

<div class="hero">
<h1>Trayectoria profesional y académica</h1>
<p>CV ampliado conectado dinámicamente a Google Sheets.</p>
</div>

<section class="section" id="pub">
<h2>Publicaciones</h2>
<div id="publicaciones-lista"></div>
</section>

<section class="section" id="com">
<h2>Comunicaciones</h2>
<div id="comunicaciones-lista"></div>
</section>

<section class="section" id="cur">
<h2>Cursos</h2>
<div id="cursos-lista"></div>
</section>

<section class="section" id="ses">
<h2>Sesiones</h2>
<div id="sesiones-lista"></div>
</section>

<section class="section" id="pro">
<h2>Proyectos</h2>
<div id="proyectos-lista"></div>
</section>

</main>

</div>
</div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCex_W7gk3Zg1ITlcjb2ZBs3WD3kH_4hiBUdxGK9HSyUEye_6P2PvG6UsDQEsYNMZNmLNazx2QkyA_/pub?gid=1280662564&single=true&output=csv";

function renderItem(r){
  return `
  <div class="item">
    <div class="year">${r.año || ""}</div>
    <div>${r.titulo || ""}</div>
  </div>`;
}

Papa.parse(csvUrl,{
  download:true,
  header:true,
  complete:(res)=>{
    const rows=res.data;

    document.getElementById("publicaciones-lista").innerHTML =
      rows.filter(r=>r.tipo==="articulo").map(renderItem).join("");

    document.getElementById("comunicaciones-lista").innerHTML =
      rows.filter(r=>r.tipo==="comunicacion").map(renderItem).join("");

    document.getElementById("cursos-lista").innerHTML =
      rows.filter(r=>r.tipo==="curso").map(renderItem).join("");

    document.getElementById("sesiones-lista").innerHTML =
      rows.filter(r=>r.tipo==="sesion").map(renderItem).join("");

    document.getElementById("proyectos-lista").innerHTML =
      rows.filter(r=>r.tipo==="proyecto").map(renderItem).join("");
  }
});
</script>

</body>
</html>
